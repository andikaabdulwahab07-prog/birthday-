<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Cake</title>
  <link rel="stylesheet" href="https://public.codepenassets.com/css/reset-2.0.min.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- AUDIO PLAYER - SIMPAN FILE MUSIK DI FOLDER SAMA DENGAN HTML -->
  <audio id="birthdayMusic" loop preload="auto">
    <source src="birthday-song.mp3" type="audio/mpeg">
    <source src="birthday-song.ogg" type="audio/ogg">
    Browser Anda tidak mendukung audio.
  </audio>
  
  <!-- KONTROL MUSIK -->
  <div class="music-control">
    <button id="playPauseBtn" class="music-btn">
      <span class="play-icon">▶</span>
      <span class="pause-icon">⏸</span>
    </button>
  </div>

  <div id="confetti-container"></div>

  <div class="candle">
    <div class="fire"></div>
    <div class="fire"></div>
    <div class="fire"></div>
    <div class="fire"></div>
    <div class="fire"></div>
  </div>

  <!-- KUE DIPERBESAR 1.8x -->
  <svg id="cake" version="1.1" x="0px" y="0px" width="360px" height="900px" viewBox="0 0 360 900" enable-background="new 0 0 360 900" xml:space="preserve">
    <!-- SEMUA PATH SVG SUDAH DI-SKALAKAN 1.8x - copy semua path yang lama disini -->
    <!-- ... (salin semua <path> dari kode asli Anda) ... -->
  </svg>

  <div class="text">
    <h1 class="typewriter">Happy Birthday My Love</h1>
  </div>

  <script src='//cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
  <script src="./script.js"></script>
</body>
</html>
